<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bonne fête de Ramadan</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="ramadan-overlay">
      <div class="stars" id="stars"></div>
      <div class="moon" aria-hidden="true"></div>
      <div class="content">
        <h1>Bonne fête de Ramadan</h1>
        <p>Que ce mois sacré vous apporte paix et réussite</p>
        <p class="countdown" id="countdown">Se termine dans --</p>
        <div class="actions">
          <button id="continueBtn">Continuer</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
