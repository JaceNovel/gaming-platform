services:
  - type: web
    name: primegaming-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_SITE_URL
        value: https://primegaming.space
      - key: NEXT_PUBLIC_API_URL
        value: https://api.primegaming.space/api
      - key: NEXT_PUBLIC_CINETPAY_API_KEY
        sync: false
      - key: NEXT_PUBLIC_CINETPAY_SITE_ID
        sync: false

  - type: web
    name: primegaming-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    disk:
      name: primegaming-backend-storage
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: CONTAINER_ROLE
        value: web
      - key: RUN_MIGRATIONS
        value: "1"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://api.primegaming.space
      - key: FRONTEND_URL
        value: https://primegaming.space
      - key: FRONTEND_URL_WWW
        value: https://www.primegaming.space
      - key: CORS_SUPPORTS_CREDENTIALS
        value: "true"
      - key: SANCTUM_STATEFUL_DOMAINS
        value: primegaming.space,www.primegaming.space
      - key: SESSION_DOMAIN
        value: .primegaming.space
      - key: SESSION_SECURE_COOKIE
        value: "true"

      - key: QUEUE_CONNECTION
        value: database
      - key: PUBLIC_UPLOADS_DISK
        value: public
      - key: PUBLIC_UPLOADS_ROOT
        value: /var/data/public-uploads

      # Mail (Brevo SMTP) - set these in Render dashboard
      - key: MAIL_MAILER
        value: brevo
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_BASE_URL
        value: https://api.brevo.com
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: MAIL_FROM_NAME
        value: "PRIME Gaming"

      # CinetPay (set these in Render dashboard)
      - key: CINETPAY_API_KEY
        sync: false
      - key: CINETPAY_SITE_ID
        sync: false
      - key: CINETPAY_SECRET
        sync: false
      - key: CINETPAY_WEBHOOK_SECRET
        sync: false
      - key: CINETPAY_TRANSFER_WEBHOOK_SECRET
        sync: false
      - key: CINETPAY_BASE_URL
        value: https://api-checkout.cinetpay.com/v2

      # FedaPay (set these in Render dashboard)
      - key: FEDAPAY_SECRET_KEY
        sync: false
      - key: FEDAPAY_ENV
        value: live
      - key: FEDAPAY_WEBHOOK_SECRET
        sync: false
      - key: FEDAPAY_PAYOUT_WEBHOOK_SECRET
        sync: false

  - type: worker
    name: primegaming-backend-worker
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: CONTAINER_ROLE
        value: worker
      - key: RUN_MIGRATIONS
        value: "0"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://api.primegaming.space
      - key: FRONTEND_URL
        value: https://primegaming.space
      - key: FRONTEND_URL_WWW
        value: https://www.primegaming.space
      - key: CORS_SUPPORTS_CREDENTIALS
        value: "true"
      - key: SANCTUM_STATEFUL_DOMAINS
        value: primegaming.space,www.primegaming.space
      - key: SESSION_DOMAIN
        value: .primegaming.space
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: QUEUE_CONNECTION
        value: database

      # Mail (Brevo SMTP) - set these in Render dashboard
      - key: MAIL_MAILER
        value: brevo
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_BASE_URL
        value: https://api.brevo.com
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: MAIL_FROM_NAME
        value: "PRIME Gaming"

      # CinetPay (set these in Render dashboard)
      - key: CINETPAY_API_KEY
        sync: false
      - key: CINETPAY_SITE_ID
        sync: false
      - key: CINETPAY_SECRET
        sync: false
      - key: CINETPAY_WEBHOOK_SECRET
        sync: false
      - key: CINETPAY_TRANSFER_WEBHOOK_SECRET
        sync: false
      - key: CINETPAY_BASE_URL
        value: https://api-checkout.cinetpay.com/v2

      # FedaPay (set these in Render dashboard)
      - key: FEDAPAY_SECRET_KEY
        sync: false
      - key: FEDAPAY_ENV
        value: live
      - key: FEDAPAY_WEBHOOK_SECRET
        sync: false
      - key: FEDAPAY_PAYOUT_WEBHOOK_SECRET
        sync: false
